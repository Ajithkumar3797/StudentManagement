<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e14;
      --surface: #12161f;
      --surface2: #1a202e;
      --border: #252d3d;
      --accent: #4fffb0;
      --accent2: #7b61ff;
      --danger: #ff4f6d;
      --warn: #ffb84f;
      --text: #e8edf5;
      --muted: #5a6580;
      --radius: 12px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,255,176,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(123,97,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative; z-index: 10;
      padding: 32px 48px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .logo-block h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .logo-block h1 span { color: var(--accent); }
    .logo-block p {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* STATUS BAR */
    #statusBar {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      transition: all 0.3s;
    }
    #statusBar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    #statusBar.success { color: var(--accent); border-color: rgba(79,255,176,0.3); }
    #statusBar.success .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #statusBar.error { color: var(--danger); border-color: rgba(255,79,109,0.3); }
    #statusBar.error .dot { background: var(--danger); }
    #statusBar.loading { color: var(--warn); border-color: rgba(255,184,79,0.3); }
    #statusBar.loading .dot { background: var(--warn); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* MAIN LAYOUT */
    main {
      position: relative; z-index: 5;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      padding: 32px 48px 48px;
    }
    @media(max-width: 900px) {
      main { grid-template-columns: 1fr; padding: 24px 20px; }
      header { padding: 24px 20px 0; }
    }

    /* PANEL */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .panel-body { padding: 24px; }

    /* FORM */
    .form-grid {
      display: grid;
      gap: 16px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field input, .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.1);
    }
    .field input::placeholder { color: var(--muted); }

    /* BUTTONS */
    .btn-row { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
      flex: 1;
      min-width: 80px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: #0b0e14;
    }
    .btn-primary:hover { background: #6bffbf; box-shadow: 0 4px 20px rgba(79,255,176,0.3); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--text); }
    .btn-danger {
      background: rgba(255,79,109,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,79,109,0.25);
    }
    .btn-danger:hover { background: rgba(255,79,109,0.22); }
    .btn-warn {
      background: rgba(123,97,255,0.12);
      color: #a991ff;
      border: 1px solid rgba(123,97,255,0.25);
    }
    .btn-warn:hover { background: rgba(123,97,255,0.22); }

    /* ID lookup row */
    .lookup-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .lookup-row .field { flex: 1; }
    .lookup-row .btn { flex: 0; padding: 11px 16px; white-space: nowrap; }

    /* MODE BADGE */
    .mode-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      font-weight: 500;
    }
    .mode-create { background: rgba(79,255,176,0.12); color: var(--accent); }
    .mode-edit   { background: rgba(255,184,79,0.12); color: var(--warn); }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* TABLE PANEL */
    .table-panel { display: flex; flex-direction: column; }
    .table-controls {
      display: flex; align-items: center; gap: 12px;
    }
    .search-wrap {
      position: relative; flex: 1;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 9px 14px 9px 36px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.9rem; pointer-events: none;
    }
    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* TABLE */
    .table-wrap { overflow-x: auto; flex: 1; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(37,45,61,0.6);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    tbody tr.selected-row { background: rgba(79,255,176,0.05); }
    tbody td {
      padding: 13px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
    }
    tbody td.id-cell {
      color: var(--muted);
      font-size: 0.72rem;
    }
    .course-tag {
      display: inline-block;
      background: rgba(123,97,255,0.14);
      color: #a991ff;
      border: 1px solid rgba(123,97,255,0.22);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .action-cell { display: flex; gap: 6px; }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 5px 8px;
      transition: all 0.15s;
      line-height: 1;
    }
    .icon-btn:hover.edit  { color: var(--warn); border-color: rgba(255,184,79,0.4); background: rgba(255,184,79,0.08); }
    .icon-btn:hover.del   { color: var(--danger); border-color: rgba(255,79,109,0.4); background: rgba(255,79,109,0.08); }

    /* EMPTY & LOADING STATES */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.85rem; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      z-index: 9999;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.3s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: rgba(79,255,176,0.15); border: 1px solid rgba(79,255,176,0.3); color: var(--accent); }
    #toast.error   { background: rgba(255,79,109,0.15); border: 1px solid rgba(255,79,109,0.3); color: var(--danger); }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ENTRY ANIMATION */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .panel { animation: slideIn 0.4s ease both; }
    .panel:nth-child(2) { animation-delay: 0.1s; }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>Student<span>Hub</span></h1>
    <p>Management System · REST API @ :8080</p>
  </div>
  <div id="statusBar">
    <span class="dot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</header>

<main>
  <!-- LEFT: FORM PANEL -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Student Record</span>
      <span class="mode-badge mode-create" id="modeBadge">CREATE</span>
    </div>
    <div class="panel-body">
      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="e.g. Arjun Sharma"/>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="e.g. arjun@college.edu"/>
        </div>
        <div class="field">
          <label>Course</label>
          <input type="text" id="course" placeholder="e.g. Computer Science"/>
        </div>
      </div>

      <div class="btn-row" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="submitForm()">
          <span id="submitLabel">＋ Add Student</span>
        </button>
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      </div>

      <div class="divider"></div>

      <!-- GET / DELETE by ID -->
      <div class="panel-title" style="margin-bottom:12px;">Lookup by ID</div>

      <div class="lookup-row">
        <div class="field">
          <label>Student ID</label>
          <input type="number" id="lookupId" placeholder="Enter ID…"/>
        </div>
        <button class="btn btn-warn" onclick="fetchById()" style="height:42px; margin-bottom:0px;">Find</button>
      </div>

      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-danger" onclick="deleteById()">🗑 Delete by ID</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: TABLE PANEL -->
  <div class="panel table-panel">
    <div class="panel-header">
      <span class="panel-title">All Students</span>
      <div class="table-controls">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Filter students…" oninput="filterTable()"/>
        </div>
        <span class="count-badge" id="countBadge">0 records</span>
        <button class="btn btn-secondary" style="flex:0; padding:8px 14px; font-size:0.75rem;" onclick="loadStudents()">↻ Refresh</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5"><div class="empty-state"><div class="icon">⏳</div><p>Loading students…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8080/students';
  let allStudents = [];
  let editingId = null;

  /* ─── STATUS BAR ─── */
  function setStatus(msg, type = '') {
    const bar = document.getElementById('statusBar');
    const txt = document.getElementById('statusText');
    bar.className = type;
    txt.textContent = msg;
  }

  /* ─── TOAST ─── */
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }

  /* ─── LOAD ALL STUDENTS ─── */
  async function loadStudents() {
    setStatus('Fetching students…', 'loading');
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allStudents = await res.json();
      renderTable(allStudents);
      setStatus(`Connected · ${allStudents.length} student${allStudents.length !== 1 ? 's' : ''}`, 'success');
    } catch (e) {
      setStatus('Backend unreachable', 'error');
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="5"><div class="empty-state"><div class="icon">⚠️</div><p>Could not connect to backend.<br>Make sure the Spring Boot app is running on port 8080.</p></div></td></tr>`;
    }
  }

  /* ─── RENDER TABLE ─── */
  function renderTable(students) {
    const tbody = document.getElementById('tableBody');
    document.getElementById('countBadge').textContent = `${students.length} record${students.length !== 1 ? 's' : ''}`;
    if (!students.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">📭</div><p>No students found.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = students.map(s => `
      <tr id="row-${s.id}" ${editingId === s.id ? 'class="selected-row"' : ''}>
        <td class="id-cell">#${s.id}</td>
        <td>${esc(s.name)}</td>
        <td>${esc(s.email)}</td>
        <td><span class="course-tag">${esc(s.course)}</span></td>
        <td>
          <div class="action-cell">
            <button class="icon-btn edit" title="Edit" onclick="startEdit(${s.id})">✏️</button>
            <button class="icon-btn del"  title="Delete" onclick="confirmDelete(${s.id}, '${esc(s.name)}')">🗑</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function esc(str = '') {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─── FILTER ─── */
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allStudents.filter(s =>
      (s.name||'').toLowerCase().includes(q) ||
      (s.email||'').toLowerCase().includes(q) ||
      (s.course||'').toLowerCase().includes(q) ||
      String(s.id).includes(q)
    );
    renderTable(filtered);
  }

  /* ─── SUBMIT (ADD or UPDATE) ─── */
  async function submitForm() {
    const name   = document.getElementById('name').value.trim();
    const email  = document.getElementById('email').value.trim();
    const course = document.getElementById('course').value.trim();

    if (!name || !email || !course) {
      showToast('Please fill in all fields.', 'error'); return;
    }

    const payload = { name, email, course };
    setStatus('Saving…', 'loading');

    try {
      let res;
      if (editingId) {
        res = await fetch(`${API}/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } else {
        res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast(editingId ? `Student #${editingId} updated!` : 'Student added!', 'success');
      clearForm();
      await loadStudents();
    } catch (e) {
      setStatus('Save failed', 'error');
      showToast('Failed to save student.', 'error');
    }
  }

  /* ─── EDIT ─── */
  function startEdit(id) {
    const student = allStudents.find(s => s.id === id);
    if (!student) return;
    editingId = id;
    document.getElementById('name').value   = student.name;
    document.getElementById('email').value  = student.email;
    document.getElementById('course').value = student.course;
    document.getElementById('modeBadge').textContent = 'EDIT';
    document.getElementById('modeBadge').className   = 'mode-badge mode-edit';
    document.getElementById('submitLabel').textContent = '✔ Update Student';
    renderTable(allStudents); // refresh selected-row highlight
    document.getElementById('name').focus();
    showToast(`Editing student #${id}`, 'success');
  }

  /* ─── CLEAR FORM ─── */
  function clearForm() {
    editingId = null;
    ['name','email','course'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modeBadge').textContent = 'CREATE';
    document.getElementById('modeBadge').className   = 'mode-badge mode-create';
    document.getElementById('submitLabel').textContent = '＋ Add Student';
    renderTable(allStudents);
  }

  /* ─── GET BY ID ─── */
  async function fetchById() {
    const id = document.getElementById('lookupId').value.trim();
    if (!id) { showToast('Enter an ID to look up.', 'error'); return; }
    setStatus('Looking up…', 'loading');
    try {
      const res = await fetch(`${API}/${id}`);
      if (res.status === 404 || !res.ok) throw new Error('Not found');
      const s = await res.json();
      if (!s) throw new Error('Not found');
      startEdit(s.id);
      // Highlight in table even if filtered
      allStudents = allStudents.filter(x => x.id !== s.id);
      allStudents.unshift(s);
      renderTable(allStudents);
      setStatus(`Found: ${s.name}`, 'success');
      showToast(`Found student: ${s.name}`, 'success');
    } catch {
      setStatus('Student not found', 'error');
      showToast(`No student with ID ${id}.`, 'error');
    }
  }

  /* ─── DELETE BY ID (from lookup) ─── */
  async function deleteById() {
    const id = document.getElementById('lookupId').value.trim();
    if (!id) { showToast('Enter an ID to delete.', 'error'); return; }
    confirmDelete(id, `#${id}`);
  }

  /* ─── CONFIRM & DELETE ─── */
  function confirmDelete(id, name) {
    if (!confirm(`Delete student "${name}"? This cannot be undone.`)) return;
    doDelete(id);
  }

  async function doDelete(id) {
    setStatus('Deleting…', 'loading');
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok && res.status !== 204) throw new Error(`HTTP ${res.status}`);
      if (editingId === Number(id)) clearForm();
      showToast(`Student #${id} deleted.`, 'success');
      await loadStudents();
    } catch {
      setStatus('Delete failed', 'error');
      showToast('Failed to delete student.', 'error');
    }
  }

  // Boot
  loadStudents();
</script>
</body>
</html>
